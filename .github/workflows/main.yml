name: Build Android APK

on:
  push:
    branches: [ main, master ] # Запуск при сохранении кода
  workflow_dispatch: # Запуск вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # ОБНОВЛЕНО: Используем последние стабильные версии с поддержкой Node 24
    - uses: actions/checkout@v4.2.2 

    - name: set up JDK 17
      uses: actions/setup-java@v4.3.0
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean Project
      run: ./gradlew clean

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # ОБНОВЛЕНО: Используем последнюю версию для загрузки артефактов
    - name: Upload APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: my-utility-apk
        path: app/build/outputs/apk/debug/app-debug.apk
